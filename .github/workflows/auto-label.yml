name: Auto Label

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  auto-label:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get changed files
        id: files
        uses: tj-actions/changed-files@v47
        with:
          json: true

      - name: Determine labels
        id: labels
        env:
          CHANGED_FILES: ${{ steps.files.outputs.all_changed_files }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          LABELS=()

          # Parse changed files and assign area labels
          while IFS= read -r file; do
            [[ -z "$file" ]] && continue

            if [[ $file =~ ^src/tools/ ]]; then
              LABELS+=("area: tools")
            elif [[ $file =~ ^src/bin/ ]]; then
              LABELS+=("area: cli")
            elif [[ $file =~ ^src/ ]]; then
              LABELS+=("area: core")
            elif [[ $file =~ ^docs/ ]]; then
              LABELS+=("type: documentation")
            elif [[ $file =~ ^\.github/ ]]; then
              LABELS+=("area: infrastructure")
            elif [[ $file =~ (test|__tests__|\.test\.|\.spec\.) ]]; then
              LABELS+=("area: testing")
            fi

            if [[ $file =~ package\.json$ ]] || [[ $file =~ pnpm-lock\.yaml$ ]]; then
              LABELS+=("dependencies")
            fi
          done < <(jq -r '.[]' <<< "$CHANGED_FILES")

          # Check for breaking changes
          if [[ "$PR_TITLE" =~ BREAKING ]] || [[ "$PR_BODY" =~ BREAKING ]]; then
            LABELS+=("breaking-change")
          fi

          # Remove duplicates and format as JSON array
          if [[ ${#LABELS[@]} -eq 0 ]]; then
            LABELS_JSON='[]'
          else
            LABELS_JSON=$(printf '%s\n' "${LABELS[@]}" | sed '/^$/d' | sort -u | jq -R . | jq -sc .)
          fi

          {
            echo 'labels<<EOF'
            echo "$LABELS_JSON"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Apply labels
        if: fromJson(steps.labels.outputs.labels)[0] != null
        uses: actions/github-script@v9
        with:
          script: |
            const labels = ${{ steps.labels.outputs.labels }};
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: labels
            });
